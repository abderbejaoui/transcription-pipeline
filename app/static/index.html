<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASR Benchmark</title>
  <link rel="stylesheet" href="/static/styles.css?v=5" />
</head>
<body>
  <main>
    <header>
      <h1>ASR Benchmark</h1>
      <p class="muted">Upload an audio file to view local CPU inference results across 8 different ASR models.</p>
    </header>

    <section class="card">
      <div class="stack">
        <div class="row">
            <input type="file" id="upload-file" accept="audio/*" />
            <button id="btn-upload" class="primary">Benchmark All Models</button>
        </div>
        <span id="benchmark-status" class="muted small"></span>
      </div>
    </section>

    <section id="results-card" class="card" hidden>
      <h2>Benchmark Results <span id="audio-duration-display" class="muted small"></span></h2>
      <div id="results-container" class="stack"></div>
    </section>

  </main>

  <script src="/static/app.js?v=5"></script>
</body>
</html>
